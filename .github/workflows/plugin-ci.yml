name: Plugin CI

on:
  push: {}
  pull_request: {}
  schedule:
    - cron: '30 5 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          mkdir -p ci_artifacts
          npm ci --no-audit --no-fund | tee ci_artifacts/npm-ci.log

      - name: Run assemble tests
        run: npm run test:assemble | tee ci_artifacts/test-assemble.log

      - name: Run registration tests
        run: npm run test:registration | tee ci_artifacts/test-registration.log

      - name: Run benchmark invariants
        run: npm run test:benchmark-invariants | tee ci_artifacts/test-benchmark-invariants.log

      - name: Run full test
        run: npm test | tee ci_artifacts/test-full.log

      - name: Run plugin CI smoke wrapper
        run: node scripts/run_plugin_ci_smoke.mjs --output ci_artifacts/plugin_ci_smoke_summary.json | tee ci_artifacts/plugin-ci-smoke.log

      - name: Run Epic C4 validation bundle (dry-run shape check)
        run: node scripts/run_epic_c4_validation_bundle.mjs --dry-run --output-dir ci_artifacts/epic_c4_validation | tee ci_artifacts/epic-c4-validation.log

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-ci-artifacts-${{ github.run_id }}
          path: ci_artifacts
          if-no-files-found: warn
